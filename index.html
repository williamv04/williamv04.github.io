    <script>
      let size = 20;

      let audio = new Audio("sniggurd sound.wav");

      let snake = [
        {
        x: 240,
        y: 240
        },
        {
        x: 240 + size,
        y: 240
        },
        {
        x: 240 + size * 2,
        y: 240
        },
        {
        x: 240 + size * 3,
        y: 240
        }
      ];   
      
      const canvas = document.getElementById("brett");
      const ctx = canvas.getContext("2d");
      const img = document.getElementById("bilde");
      const mat = document.getElementById("mat");

      ctx.shadowOffsetX = 10;
      ctx.shadowOffsetY = 10;
      ctx.shadowBlur = 30;
      ctx.shadowColor = "grey";

      let scoreEl = document.querySelector("h1");
      let score = 0;
      let highScore = 0;
      let highScoreEl = document.querySelector("h2");


      let dx = 0;
      let dy = 0;

      window.onload = function() {
        main();       
        gen_food();       
      };


      function snakePart(snakePart){
        ctx.drawImage(img, snakePart.x, snakePart.y, size, size);
      }

      function draw_snake(){
        snake.forEach(snakePart);
      }

      function move_snake(){
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);
        const has_eaten_food = snake[0].x === food_x && snake[0].y === food_y;
        if (has_eaten_food) {
          // Generate new food location
          gen_food();
          score++
          scoreEl.innerText = "Score: " + score;
          audio.play();
        } 
        else {
          // Remove the last part of snake body
          snake.pop();
        }
      }

      document.addEventListener("keydown", change_direction)

      function change_direction(event) 
      {  
        const LEFT_KEY = 37;
        const RIGHT_KEY = 39;
        const UP_KEY = 38;
        const DOWN_KEY = 40;
 
        const keyPressed = event.keyCode;
        const goingUp = dy === -size;
        const goingDown = dy === size;
        const goingRight = dx === size;  
        const goingLeft = dx === -size;
 
        if (keyPressed === LEFT_KEY && !goingRight){    
          dx = -size;
          dy = 0;  
        }
 
        if (keyPressed === UP_KEY && !goingDown){    
          dx = 0;
          dy = -size;
        }
 
        if (keyPressed === RIGHT_KEY && !goingLeft){    
          dx = size;
          dy = 0;
        }
 
        if (keyPressed === DOWN_KEY && !goingUp){    
          dx = 0;
          dy = size;
        }
      }

      function has_game_ended(){  
        for (let i = 4; i < snake.length; i++){    
          const has_collided = snake[i].x === snake[0].x && snake[i].y === snake[0].y
          if (has_collided){
            if(score > highScore){
              highScore = score;
              highScoreEl.innerText = "High Score: " + highScore;
            }
            return true
          } 
        }
        const hitLeftWall = snake[0].x < 0;  
        const hitRightWall = snake[0].x > canvas.width - size;
        const hitToptWall = snake[0].y < 0;
        const hitBottomWall = snake[0].y > canvas.height - size;
 
        return hitLeftWall ||  hitRightWall || hitToptWall || hitBottomWall
      }

      function random_food(min, max){  
        return Math.round((Math.random() * (max-min) + min) / size) * size;
      }
 
      function gen_food(){  
        food_x = random_food(0, canvas.width - size);
        food_y = random_food(0, canvas.height - size);
        snake.forEach(function has_snake_eaten_food(part){
          const has_eaten = part.x == food_x && part.y == food_y;
          if (has_eaten) gen_food();
        });
      }

      function drawFood(){
        ctx.drawImage(mat, food_x, food_y, size, size);
      }

      function main(){

        if (has_game_ended()){
          return;
        }

        setTimeout(function onTick(){
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawFood();
          move_snake();
          draw_snake();
          if(score > highScore){
              highScore = score;
              highScoreEl.innerText = "High Score: " + highScore;
          }
          main();
        }, 100);
      }

      function reset(){
        snake = [
        {
        x: 240,
        y: 240
        },
        {
        x: 240 + size,
        y: 240
        },
        {
        x: 240 + size * 2,
        y: 240
        },
        {
        x: 240 + size * 3,
        y: 240
        }
        ];   

        score = 0;
        scoreEl.innerText = "Score: " + score;
        dx = 0;
        dy = 0;
        main();
      }

      let buttonEl = document.querySelector("button");
      buttonEl.addEventListener("click", reset);
      document.addEventListener("keypress", function (e){
        if (e.key == "r"){
          reset();
        }
      })
    </script>
